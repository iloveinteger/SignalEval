name: Daily Signal Collection

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Initialize database
        run: python scripts/init_db.py

      - name: Seed mock prices
        run: python scripts/seed_mock_prices.py

      - name: Collect mock signals
        run: python scripts/collect_mock_signals.py

      - name: Compute returns
        run: python scripts/compute_returns.py

      - name: Build static site
        run: python scripts/build_site.py

      - name: Commit updates
        run: |
          git config user.name "signal-league-bot"
          git config user.email "bot@example.com"
          git add data/exports/ docs/
          git commit -m "Daily mock signal update" || echo "No changes"
          git push
